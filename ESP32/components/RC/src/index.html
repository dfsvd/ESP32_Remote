<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPV RC</title>
    <style>
      :root {
        --bg-color: #1e1e1e;
        --panel-bg-color: #242424;
        --panel-soft-bg: #2c2c2e;
        --border-color: #333;
        --text-color: #f0f0f5;
        --text-secondary-color: #a0a0a5;
        --header-height: 60px;
        --accent-color: #00bfff;
        --glow-color: rgba(0, 191, 255, 0.5);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      }

      #app-grid {
        display: grid;
        width: 100%;
        height: 100%;
        grid-template-columns: 1fr 400px;
        grid-template-rows: var(--header-height) 1fr;
        grid-template-areas:
          "header sidebar"
          "joysticks sidebar";
      }

      .app-header {
        grid-area: header;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        padding: 0 24px;
      }

      .app-footer {
        grid-area: joysticks;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 200px;
        padding: 16px;
        background-image: radial-gradient(circle, #2a2a2a, #1a1a1a);
      }

      .app-sidebar {
        grid-area: sidebar;
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 24px;
        background: var(--panel-bg-color);
        border-left: 1px solid var(--border-color);
      }

      .sidebar-content-wrapper {
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex-grow: 1;
        overflow-y: auto;
        padding-right: 10px;
      }

      .sidebar-content-wrapper::-webkit-scrollbar {
        width: 8px;
      }

      .sidebar-content-wrapper::-webkit-scrollbar-thumb {
        background-color: var(--accent-color);
        border-radius: 4px;
      }

      h4 {
        margin: 0 0 16px;
        padding-bottom: 12px;
        text-align: center;
        color: var(--text-secondary-color);
        text-transform: uppercase;
        letter-spacing: 1px;
        border-bottom: 1px solid var(--border-color);
      }

      .header-group {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .save-button,
      .secondary-button,
      .toggle-btn,
      .set-button,
      .bind-button,
      .power-select {
        border-radius: 6px;
        border: 1px solid var(--accent-color);
        background: transparent;
        color: var(--accent-color);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .save-button,
      .secondary-button,
      .bind-button,
      .power-select {
        padding: 10px 14px;
        font-size: 14px;
      }

      .save-button:hover,
      .secondary-button:hover,
      .bind-button:hover,
      .toggle-btn:hover,
      .set-button:hover {
        background: var(--accent-color);
        color: var(--bg-color);
        box-shadow: 0 0 15px var(--glow-color);
      }

      .power-select {
        min-width: 110px;
      }

      .module-card {
        padding: 14px;
        border-radius: 8px;
        background: var(--panel-soft-bg);
        margin-bottom: 16px;
      }

      .module-card-title {
        margin-bottom: 12px;
        color: var(--text-secondary-color);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      .module-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .joystick-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .joystick-base {
        width: 150px;
        height: 150px;
        position: relative;
        border-radius: 50%;
        border: 2px solid #444;
        background-color: rgba(255, 255, 255, 0.03);
      }

      .joystick-stick {
        width: 50px;
        height: 50px;
        position: absolute;
        border-radius: 50%;
        border: 2px solid #fff;
        background-color: var(--accent-color);
        box-shadow: 0 0 10px rgba(0, 191, 255, 0.7), inset 0 0 5px rgba(255, 255, 255, 0.5);
        transform: translate(-50%, -50%);
      }

      .joystick-label {
        color: var(--text-secondary-color);
        font-weight: 700;
      }

      .aux-channel {
        width: 320px;
        padding: 8px 16px;
        border-radius: 8px;
        background: var(--panel-soft-bg);
      }

      .main-display {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .channel-label {
        width: 50px;
        color: var(--text-secondary-color);
        font-weight: 700;
      }

      .slider-container {
        flex-grow: 1;
        display: flex;
        align-items: center;
      }

      .percentage-slider,
      .raw-slider {
        width: 100%;
        outline: none;
        border-radius: 5px;
        appearance: none;
      }

      .percentage-slider {
        height: 10px;
        background: #1a1a1a;
        border: 1px solid #444;
      }

      .raw-slider {
        height: 8px;
        background: #333;
      }

      .percentage-slider::-webkit-slider-thumb,
      .raw-slider::-webkit-slider-thumb {
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid var(--accent-color);
        background: #f0f0f5;
      }

      .channel-value {
        width: 56px;
        text-align: right;
        font-family: monospace;
      }

      .toggle-btn {
        padding: 0 8px;
        border: none;
        background: transparent;
        color: var(--text-secondary-color);
        font-size: 18px;
      }

      .details {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #444;
        display: none;
        flex-direction: column;
        gap: 10px;
      }

      .details.open {
        display: flex;
      }

      .raw-value {
        text-align: center;
        color: #aaa;
        font-family: monospace;
        font-size: 13px;
      }

      .control-group {
        display: grid;
        grid-template-columns: 40px 1fr 60px;
        gap: 8px;
        align-items: center;
      }

      .raw-slider-group {
        grid-template-columns: 1fr;
      }

      input[type="number"] {
        width: 100%;
        padding: 4px 6px;
        border-radius: 4px;
        border: 1px solid #555;
        background: #333;
        color: var(--text-color);
      }

      .set-button {
        padding: 4px 6px;
      }
    </style>
  </head>
  <body>
    <div id="app-grid">
      <header class="app-header">
        <div class="header-group">
          <select id="crsf-power" class="power-select">
            <option value="0">10mW</option>
            <option value="1">25mW</option>
            <option value="2">100mW</option>
            <option value="3">250mW</option>
            <option value="4">500mW</option>
            <option value="5">1000mW</option>
          </select>
          <button id="crsf-bind" class="bind-button">Bind</button>
          <button id="save-button" class="save-button">保存</button>
        </div>
      </header>

      <aside class="app-sidebar">
        <div class="module-card">
          <div class="module-card-title">External Module / CRSF</div>
          <div class="module-controls">
            <span>ELRS 功率</span>
            <span id="power-label">25mW</span>
          </div>
        </div>

        <h4>通道校准</h4>
        <div id="channel-list" class="sidebar-content-wrapper"></div>
      </aside>

      <footer class="app-footer">
        <div class="joystick-container">
          <div class="joystick-base">
            <div id="left-stick" class="joystick-stick"></div>
          </div>
          <div class="joystick-label">左摇杆 (油门/偏航)</div>
        </div>

        <div class="joystick-container">
          <div class="joystick-base">
            <div id="right-stick" class="joystick-stick"></div>
          </div>
          <div class="joystick-label">右摇杆 (俯仰/横滚)</div>
        </div>
      </footer>
    </div>

    <script>
      const channels = Array.from({ length: 16 }, (_, index) => ({
        id: index + 1,
        mapped: 1500,
        rawValue: 1500,
        cal: { min: 1000, mid: 1500, max: 2000 },
      }));

      const powerLabels = ["10mW", "25mW", "100mW", "250mW", "500mW", "1000mW"];
      const channelList = document.getElementById("channel-list");
      const saveButton = document.getElementById("save-button");
      const bindButton = document.getElementById("crsf-bind");
      const powerSelect = document.getElementById("crsf-power");
      const powerLabel = document.getElementById("power-label");
      const leftStick = document.getElementById("left-stick");
      const rightStick = document.getElementById("right-stick");
      let socket = null;
      let reconnectTimer = null;

      function clampPercent(value) {
        return Math.max(-100, Math.min(100, value));
      }

      function computePercent(channel) {
        const { rawValue, cal } = channel;
        if (rawValue < cal.mid) {
          if (cal.mid === cal.min) return 0;
          return clampPercent(Math.round(-100 * (cal.mid - rawValue) / (cal.mid - cal.min)));
        }
        if (cal.max === cal.mid) return 0;
        return clampPercent(Math.round(100 * (rawValue - cal.mid) / (cal.max - cal.mid)));
      }

      function setStickPosition(element, x, y) {
        const limited = Math.hypot(x, y) > 100 ? 100 / Math.hypot(x, y) : 1;
        const finalX = x * limited;
        const finalY = y * limited;
        const range = (50 / 150) * 100;
        element.style.left = `${50 + finalX / 100 * range}%`;
        element.style.top = `${50 - finalY / 100 * range}%`;
      }

      function updateJoysticks() {
        setStickPosition(leftStick, computePercent(channels[3]), computePercent(channels[2]));
        setStickPosition(rightStick, computePercent(channels[0]), computePercent(channels[1]));
      }

      function sendData(message) {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(message);
        }
      }

      function updatePowerLabel(index) {
        powerLabel.textContent = powerLabels[index] || `${index}`;
      }

      function handleMessage(message) {
        if (message.startsWith("M:")) {
          return;
        }

        if (message.startsWith("P:")) {
          const power = parseInt(message.slice(2), 10);
          if (!Number.isNaN(power)) {
            powerSelect.value = String(power);
            updatePowerLabel(power);
          }
          return;
        }

        if (message.startsWith("C:")) {
          const payload = message.slice(2).trim();
          if (payload.includes(";")) {
            payload.split(";").forEach((item) => {
              const [id, min, mid, max] = item.split(",").map((value) => parseInt(value, 10));
              const channel = channels[id - 1];
              if (!channel) return;
              channel.cal.min = min;
              channel.cal.mid = mid;
              channel.cal.max = max;
            });
            renderChannels();
          }
          return;
        }

        const parts = message.trim().split(",");
        if (parts.length < 16) return;

        parts.forEach((item, index) => {
          const [mapped, raw] = item.split(":").map((value) => parseInt(value, 10));
          if (Number.isNaN(mapped) || Number.isNaN(raw) || !channels[index]) return;
          channels[index].mapped = mapped;
          channels[index].rawValue = raw;
        });

        renderChannels();
        updateJoysticks();
      }

      function connectWebSocket() {
        const url = `ws://${window.location.hostname}/ws`;
        socket = new WebSocket(url);

        socket.onopen = () => {
          if (reconnectTimer) {
            clearInterval(reconnectTimer);
            reconnectTimer = null;
          }
          sendData("GET_CAL");
        };

        socket.onmessage = (event) => handleMessage(event.data);

        socket.onclose = () => {
          socket = null;
          if (!reconnectTimer) {
            reconnectTimer = setInterval(connectWebSocket, 3000);
          }
        };
      }

      function createChannelElement(channel) {
        const wrapper = document.createElement("div");
        wrapper.className = "aux-channel";

        const percent = computePercent(channel);
        wrapper.innerHTML = `
          <div class="main-display">
            <label class="channel-label">CH${channel.id}</label>
            <div class="slider-container">
              <input class="percentage-slider" type="range" min="-100" max="100" value="${percent}" />
            </div>
            <span class="channel-value">${percent}%</span>
            <button class="toggle-btn">▶</button>
          </div>
          <div class="details">
            <div class="raw-value">原始值: ${channel.rawValue}</div>
            <div class="control-group raw-slider-group">
              <input class="raw-slider" type="range" min="1000" max="2000" value="${channel.rawValue}" />
            </div>
            <div class="control-group">
              <label>Min:</label>
              <input class="min-input" type="number" value="${channel.cal.min}" />
              <button class="set-button">Set</button>
            </div>
            <div class="control-group">
              <label>Mid:</label>
              <input class="mid-input" type="number" value="${channel.cal.mid}" />
              <button class="set-button">Set</button>
            </div>
            <div class="control-group">
              <label>Max:</label>
              <input class="max-input" type="number" value="${channel.cal.max}" />
              <button class="set-button">Set</button>
            </div>
          </div>
        `;

        const percentSlider = wrapper.querySelector(".percentage-slider");
        const percentValue = wrapper.querySelector(".channel-value");
        const details = wrapper.querySelector(".details");
        const toggle = wrapper.querySelector(".toggle-btn");
        const rawSlider = wrapper.querySelector(".raw-slider");
        const minInput = wrapper.querySelector(".min-input");
        const midInput = wrapper.querySelector(".mid-input");
        const maxInput = wrapper.querySelector(".max-input");
        const setButtons = wrapper.querySelectorAll(".set-button");

        toggle.addEventListener("click", () => {
          const open = details.classList.toggle("open");
          toggle.textContent = open ? "▼" : "▶";
        });

        percentSlider.addEventListener("input", (event) => {
          const value = parseInt(event.target.value, 10);
          let raw = channel.cal.mid;
          if (value < 0) {
            raw = channel.cal.mid + value / 100 * (channel.cal.mid - channel.cal.min);
          } else if (value > 0) {
            raw = channel.cal.mid + value / 100 * (channel.cal.max - channel.cal.mid);
          }
          channel.rawValue = Math.round(raw);
          renderChannels();
          updateJoysticks();
        });

        rawSlider.addEventListener("input", (event) => {
          channel.rawValue = parseInt(event.target.value, 10);
          renderChannels();
          updateJoysticks();
        });

        minInput.addEventListener("input", (event) => {
          channel.cal.min = parseInt(event.target.value, 10) || channel.cal.min;
        });

        midInput.addEventListener("input", (event) => {
          channel.cal.mid = parseInt(event.target.value, 10) || channel.cal.mid;
        });

        maxInput.addEventListener("input", (event) => {
          channel.cal.max = parseInt(event.target.value, 10) || channel.cal.max;
        });

        setButtons[0].addEventListener("click", () => {
          channel.cal.min = channel.rawValue;
          renderChannels();
        });

        setButtons[1].addEventListener("click", () => {
          channel.cal.mid = channel.rawValue;
          renderChannels();
        });

        setButtons[2].addEventListener("click", () => {
          channel.cal.max = channel.rawValue;
          renderChannels();
        });

        percentValue.textContent = `${percent}%`;
        return wrapper;
      }

      function renderChannels() {
        channelList.innerHTML = "";
        channels.forEach((channel) => {
          channelList.appendChild(createChannelElement(channel));
        });
      }

      saveButton.addEventListener("click", () => {
        if (!socket) {
          alert("未连接到设备，无法保存！");
          return;
        }

        const payload = `C:${channels.map((channel) => `${channel.id},${channel.cal.min},${channel.cal.mid},${channel.cal.max}`).join(";")}`;
        sendData(payload);
        sendData(`P:${powerSelect.value}`);
        updatePowerLabel(parseInt(powerSelect.value, 10));
        alert("已发送校准数据与 CRSF 配置");
      });

      bindButton.addEventListener("click", () => {
        sendData("BIND");
        alert("已发送 Bind 指令");
      });

      powerSelect.addEventListener("change", () => {
        const power = parseInt(powerSelect.value, 10);
        updatePowerLabel(power);
        sendData(`P:${power}`);
      });

      renderChannels();
      updateJoysticks();
      connectWebSocket();
    </script>
  </body>
</html>
